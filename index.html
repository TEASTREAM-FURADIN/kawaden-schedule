<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>川電テクノ スケジュールボード</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- ★追加：画像を生成・保存するための魔法のライブラリ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect } = React;

    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, onSnapshot, deleteField } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyAO6OY-QQ52dByAeOwa2q14TkzGADYCsnA",
      authDomain: "kawaden-schedule.firebaseapp.com",
      projectId: "kawaden-schedule",
      storageBucket: "kawaden-schedule.firebasestorage.app",
      messagingSenderId: "893090658248",
      appId: "1:893090658248:web:624450db548af18ba3f2fd"
    };

    const HOLIDAYS_2026 = [
      '1/1', '1/12', '2/11', '2/23', '3/20', '4/29', '5/3', '5/4', '5/5', '5/6',
      '7/20', '8/11', '9/21', '9/22', '9/23', '10/12', '11/3', '11/23'
    ];

    const INITIAL_PEOPLE = [
      '川口雄吉', '川口雄志', '石橋広行', '門田友彰', '小中原満',
      '池田元樹', '浜谷電気', '森拓也', '松本ダイスケ', '安井',
      '林涼介', 'おだ', '田子', 'まるは電気', '市原',
      '野村', '柳井', '久保田浩行', '畠山電工', '加藤'
    ];

    const COLOR_PRESETS = [
      { id: 'white', class: 'bg-white text-slate-800 border-slate-300' },
      { id: 'blue', class: 'bg-blue-100 text-blue-800 border-blue-200' },
      { id: 'green', class: 'bg-green-100 text-green-800 border-green-200' },
      { id: 'yellow', class: 'bg-yellow-100 text-yellow-800 border-yellow-200' },
      { id: 'orange', class: 'bg-orange-100 text-orange-800 border-orange-200' },
      { id: 'purple', class: 'bg-purple-100 text-purple-800 border-purple-200' },
      { id: 'teal', class: 'bg-teal-100 text-teal-800 border-teal-200' },
      { id: 'pink', class: 'bg-pink-100 text-pink-800 border-pink-200' },
      { id: 'red', class: 'bg-red-100 text-red-800 font-bold border-red-200' },
      { id: 'gray', class: 'bg-gray-200 text-gray-800 border-gray-300' },
    ];

    const ROW_BGS = {
      'bg-white': 'bg-white', 'bg-blue-100': 'bg-blue-100', 'bg-green-100': 'bg-green-100',
      'bg-yellow-100': 'bg-yellow-100', 'bg-orange-100': 'bg-orange-100', 'bg-purple-100': 'bg-purple-100',
      'bg-teal-100': 'bg-teal-100', 'bg-pink-100': 'bg-pink-100', 'bg-red-100': 'bg-red-100',
      'bg-gray-200': 'bg-gray-200',
    };

    const INITIAL_STAMPS = [
      { id: 1, type: 'site', name: '九条ビル', colorClass: 'bg-blue-100 text-blue-800 border-blue-200' },
      { id: 2, type: 'site', name: 'キンチョー他', colorClass: 'bg-green-100 text-green-800 border-green-200' },
      { id: 3, type: 'site', name: 'MUFG守口', colorClass: 'bg-yellow-100 text-yellow-800 border-yellow-200' },
      { id: 4, type: 'site', name: 'MUFG新大阪', colorClass: 'bg-orange-100 text-orange-800 border-orange-200' },
      { id: 5, type: 'site', name: 'サンユー', colorClass: 'bg-purple-100 text-purple-800 border-purple-200' },
      { id: 6, type: 'status', name: '休', colorClass: 'bg-red-100 text-red-800 font-bold border-red-200' },
      { id: 7, type: 'status', name: '休仮', colorClass: 'bg-pink-100 text-pink-800 border-pink-200' },
      { id: 8, type: 'status', name: '私用休', colorClass: 'bg-rose-100 text-rose-800 border-rose-200' },
    ];

    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [db, setDb] = useState(null);
      const [startDate, setStartDate] = useState(new Date(2026, 2, 16)); 
      const [peopleList, setPeopleList] = useState(INITIAL_PEOPLE);
      const [stamps, setStamps] = useState(INITIAL_STAMPS); 
      const [schedule, setSchedule] = useState({}); 
      const [siteSchedule, setSiteSchedule] = useState({}); 
      const [personColors, setPersonColors] = useState({}); 
      const [globalMemo, setGlobalMemo] = useState(''); 
      const [viewMode, setViewMode] = useState('edit'); 
      const [isStampSettingOpen, setIsStampSettingOpen] = useState(false);
      const [isPersonSettingOpen, setIsPersonSettingOpen] = useState(false);
      const [selectedPersonCell, setSelectedPersonCell] = useState(null); 
      const [selectedSiteCell, setSelectedSiteCell] = useState(null); 
      const [selectedPersonForColor, setSelectedPersonForColor] = useState(null); 
      const [memoInput, setMemoInput] = useState(''); 
      const [siteTaskInput, setSiteTaskInput] = useState('');
      
      const [newPersonName, setNewPersonName] = useState('');
      const [editingPersonIndex, setEditingPersonIndex] = useState(null);
      const [editingPersonName, setEditingPersonName] = useState('');

      const [stampMode, setStampMode] = useState('overwrite');
      const [selectedTime, setSelectedTime] = useState('');

      const [authReady, setAuthReady] = useState(false);
      const [syncStatus, setSyncStatus] = useState('connecting');
      const [syncErrorMsg, setSyncErrorMsg] = useState('');
      
      // ★追加: 画像保存用の新しい状態
      const [generatedImage, setGeneratedImage] = useState(null);
      const [isGenerating, setIsGenerating] = useState(false);

      useEffect(() => {
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const firestore = getFirestore(app);
        setDb(firestore);

        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (err) {
            console.error("Auth Error:", err);
            setSyncStatus('error');
            setSyncErrorMsg('匿名認証が有効になっていません。');
            setAuthReady(true);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (user) => {
          setCurrentUser(user);
          setAuthReady(true);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!currentUser || !db) return;

        const docRef = doc(db, 'scheduleBoard', 'main');
        const unsubscribe = onSnapshot(docRef, (docSnap) => {
          setSyncStatus('synced');
          if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.peopleList) setPeopleList(data.peopleList);
            if (data.stamps) setStamps(data.stamps);
            if (data.schedule) setSchedule(data.schedule);
            if (data.siteSchedule) setSiteSchedule(data.siteSchedule);
            if (data.personColors) setPersonColors(data.personColors);
            if (data.globalMemo !== undefined) setGlobalMemo(data.globalMemo);
          } else {
            setDoc(docRef, {
              peopleList: INITIAL_PEOPLE, stamps: INITIAL_STAMPS,
              schedule: {}, siteSchedule: {}, personColors: {}, globalMemo: ''
            }).catch(console.error);
          }
        }, (err) => {
          console.error("Firestore Listen Error:", err);
          setSyncStatus('error');
          if (err.code === 'permission-denied') {
            setSyncErrorMsg('Firestoreのルール設定が完了していません。「テストモード」になっているか確認してください。');
          } else {
            setSyncErrorMsg(err.message);
          }
        });
        return () => unsubscribe();
      }, [currentUser, db]);

      const updateCloud = async (newData) => {
        if (!currentUser || !db || syncStatus === 'error' || syncStatus === 'offline') return;
        try {
          const docRef = doc(db, 'scheduleBoard', 'main');
          await setDoc(docRef, newData, { merge: true });
        } catch (err) {
          console.error("Update Cloud Error:", err);
        }
      };

      const todayStr = `${new Date().getMonth() + 1}/${new Date().getDate()}`;
      
      const currentDates = Array.from({ length: 14 }).map((_, i) => {
        const d = new Date(startDate);
        d.setDate(startDate.getDate() + i);
        const dateStr = `${d.getMonth() + 1}/${d.getDate()}`;
        const dayStr = ['日','月','火','水','木','金','土'][d.getDay()];
        const isHoliday = d.getDay() === 0 || HOLIDAYS_2026.includes(dateStr);
        return { date: dateStr, day: dayStr, isHoliday: isHoliday };
      });

      const shiftDate = (days) => setStartDate(prev => { const d = new Date(prev); d.setDate(d.getDate() + days); return d; });
      const resetToToday = () => {
        const today = new Date();
        const diff = today.getDate() - today.getDay() + (today.getDay() === 0 ? -6 : 1);
        setStartDate(new Date(today.setDate(diff)));
      };

      // ★修正: スマホで確実に保存できるように「画面に画像を表示して長押し保存」させる方式に変更
      const exportToImage = () => {
        const target = document.getElementById('capture-area');
        if (!target) return;
        
        setIsGenerating(true); // くるくるローディングを表示
        window.scrollTo(0, 0); // ズレ防止
        
        // 描画が安定するのを少し待ってから画像化する
        setTimeout(() => {
          html2canvas(target, {
            scale: 2, 
            backgroundColor: '#f3f4f6', 
            useCORS: true
          }).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            setGeneratedImage(imgData); // 生成した画像を画面に表示する
            setIsGenerating(false);
          }).catch(err => {
            console.error("画像保存エラー:", err);
            alert("画像の生成に失敗しました。");
            setIsGenerating(false);
          });
        }, 300);
      };

      const addPerson = () => {
        if (!newPersonName.trim()) return;
        const newList = [...peopleList, newPersonName.trim()];
        setPeopleList(newList);
        updateCloud({ peopleList: newList });
        setNewPersonName('');
      };

      const movePerson = (index, direction) => {
        const newList = [...peopleList];
        const target = direction === 'up' ? index - 1 : index + 1;
        if (target >= 0 && target < newList.length) {
          [newList[index], newList[target]] = [newList[target], newList[index]];
          setPeopleList(newList);
          updateCloud({ peopleList: newList });
        }
      };

      const deletePerson = (index) => {
        if(window.confirm('削除しますか？')) {
          const newList = peopleList.filter((_, i) => i !== index);
          setPeopleList(newList);
          updateCloud({ peopleList: newList });
        }
      };

      const startEditPerson = (index, currentName) => {
        setEditingPersonIndex(index);
        setEditingPersonName(currentName);
      };

      const saveEditPerson = (index) => {
        if (!editingPersonName.trim()) return;
        const oldName = peopleList[index];
        const newName = editingPersonName.trim();
        if (oldName === newName) { setEditingPersonIndex(null); return; }

        const newPeopleList = [...peopleList];
        newPeopleList[index] = newName;

        const newPersonColors = { ...personColors };
        const personColorUpdates = {};
        if (newPersonColors[oldName]) {
          newPersonColors[newName] = newPersonColors[oldName];
          personColorUpdates[newName] = newPersonColors[oldName];
          personColorUpdates[oldName] = deleteField(); 
          delete newPersonColors[oldName];
        }

        const newSchedule = { ...schedule };
        const scheduleUpdates = {};
        Object.keys(newSchedule).forEach(key => {
          if (key.startsWith(`${oldName}-`)) {
            const datePart = key.replace(`${oldName}-`, '');
            newSchedule[`${newName}-${datePart}`] = newSchedule[key];
            scheduleUpdates[`${newName}-${datePart}`] = newSchedule[key];
            scheduleUpdates[key] = deleteField(); 
            delete newSchedule[key];
          }
        });

        setPeopleList(newPeopleList); setPersonColors(newPersonColors); setSchedule(newSchedule);
        
        const cloudPayload = { peopleList: newPeopleList };
        if (Object.keys(personColorUpdates).length > 0) cloudPayload.personColors = personColorUpdates;
        if (Object.keys(scheduleUpdates).length > 0) cloudPayload.schedule = scheduleUpdates;
        
        updateCloud(cloudPayload);
        setEditingPersonIndex(null);
      };

      const handleSiteCellClick = (siteName, date) => {
        if (viewMode === 'preview') return;
        setSiteTaskInput(siteSchedule[`${siteName}-${date}`] || '');
        setSelectedSiteCell({ siteName, date });
      };

      const saveSiteTask = () => {
        const key = `${selectedSiteCell.siteName}-${selectedSiteCell.date}`;
        const newSiteSchedule = { ...siteSchedule };
        
        if (!siteTaskInput.trim()) {
          delete newSiteSchedule[key];
          setSiteSchedule(newSiteSchedule);
          updateCloud({ siteSchedule: { [key]: deleteField() } }); 
        } else {
          newSiteSchedule[key] = siteTaskInput.trim();
          setSiteSchedule(newSiteSchedule);
          updateCloud({ siteSchedule: { [key]: siteTaskInput.trim() } });
        }
        setSelectedSiteCell(null);
      };

      const handlePersonCellClick = (person, date) => {
        if (viewMode === 'preview') return;
        
        const cellData = schedule[`${person}-${date}`];
        let memoStr = '';
        if (cellData) {
          const arr = Array.isArray(cellData) ? cellData : [cellData];
          memoStr = arr.map(a => a.memo).filter(Boolean).join(' / ');
        }
        
        setMemoInput(memoStr);
        setStampMode('overwrite');
        setSelectedTime('');
        setSelectedPersonCell({ person, date });
      };

      const handleStampClick = (stampName) => {
        const key = `${selectedPersonCell.person}-${selectedPersonCell.date}`;
        const newSchedule = { ...schedule };
        
        if (stampName === '空欄にする') {
          delete newSchedule[key];
          setSchedule(newSchedule);
          updateCloud({ schedule: { [key]: deleteField() } }); 
        } else {
          const newItem = { siteName: stampName, memo: memoInput.trim(), time: selectedTime };
          
          if (stampMode === 'overwrite') {
            newSchedule[key] = [newItem];
          } else {
            const existing = newSchedule[key];
            if (existing) {
              const arr = Array.isArray(existing) ? existing : [existing];
              if (arr.length >= 3) return;
              newSchedule[key] = [...arr, newItem];
            } else {
              newSchedule[key] = [newItem];
            }
          }
          setSchedule(newSchedule);
          updateCloud({ schedule: { [key]: newSchedule[key] } });
        }
        
        if (stampMode === 'overwrite' || stampName === '空欄にする') {
          setSelectedPersonCell(null);
          setMemoInput('');
          setSelectedTime('');
        } else {
          setMemoInput('');
          setSelectedTime('');
        }
      };

      const handlePersonColorClick = (colorClass) => {
        const newColors = { ...personColors };
        if (colorClass === 'bg-slate-200 text-slate-800') {
          delete newColors[selectedPersonForColor];
          setPersonColors(newColors);
          updateCloud({ personColors: { [selectedPersonForColor]: deleteField() } }); 
        } else {
          newColors[selectedPersonForColor] = colorClass;
          setPersonColors(newColors);
          updateCloud({ personColors: { [selectedPersonForColor]: colorClass } });
        }
        setSelectedPersonForColor(null);
      };

      const [newStampName, setNewStampName] = useState('');
      const [newStampType, setNewStampType] = useState('site');
      const [newStampColor, setNewStampColor] = useState(COLOR_PRESETS[0].class);

      const addNewStamp = () => {
        if (!newStampName.trim()) return;
        const newStamps = [...stamps, { id: Date.now(), type: newStampType, name: newStampName.trim(), colorClass: newStampColor }];
        setStamps(newStamps);
        updateCloud({ stamps: newStamps });
        setNewStampName('');
      };

      const deleteStamp = (id) => {
        if(window.confirm('削除しますか？')) {
          const newStamps = stamps.filter(s => s.id !== id);
          setStamps(newStamps);
          updateCloud({ stamps: newStamps });
        }
      };

      const getStampColor = (name) => stamps.find(s => s.name === name)?.colorClass || 'bg-gray-50';

      if (!authReady && syncStatus !== 'error') {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white p-6 text-center">
            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-white mx-auto mb-4"></div>
            <p className="font-bold">サーバーに接続中...</p>
          </div>
        );
      }

      let currentStampCount = 0;
      let isCellFull = false;
      if (selectedPersonCell) {
        const cellData = schedule[`${selectedPersonCell.person}-${selectedPersonCell.date}`];
        currentStampCount = cellData ? (Array.isArray(cellData) ? cellData.length : 1) : 0;
        isCellFull = stampMode === 'append' && currentStampCount >= 3;
      }

      return (
        <div className={`${viewMode === 'edit' ? 'h-screen overflow-hidden' : 'min-h-screen'} bg-gray-100 font-sans text-sm md:text-base flex flex-col relative`}>
          
          {/* ★追加: 画像生成中のくるくる表示 */}
          {isGenerating && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] backdrop-blur-sm">
              <div className="bg-white p-6 rounded-2xl flex flex-col items-center shadow-2xl">
                <div className="animate-spin rounded-full h-12 w-12 border-b-4 border-blue-600 mb-4"></div>
                <p className="font-bold text-slate-800 text-lg">画像を生成中...</p>
                <p className="text-sm text-slate-500 mt-2">そのまま数秒お待ちください</p>
              </div>
            </div>
          )}

          {/* ★追加: 完成した画像を表示するポップアップ（ここで長押し保存してもらう） */}
          {generatedImage && (
            <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[100] p-2 md:p-4 backdrop-blur-sm flex-col">
              <div className="bg-white w-full max-w-3xl rounded-2xl overflow-hidden flex flex-col max-h-[95vh] shadow-2xl animate-[scaleIn_0.2s_ease-out]">
                <div className="p-4 border-b bg-slate-50 flex justify-between items-start flex-shrink-0">
                  <div>
                    <h3 className="font-bold text-lg text-slate-800">📸 画像が完成しました！</h3>
                    <div className="bg-red-100 border border-red-300 p-2 rounded mt-2">
                      <p className="text-sm text-red-700 font-bold">※下の画像を【長押し】して「写真に追加（保存）」または「LINEで送る」を選んでください。</p>
                    </div>
                  </div>
                  <button onClick={() => setGeneratedImage(null)} className="bg-slate-200 hover:bg-slate-300 w-10 h-10 rounded-full font-bold transition-colors ml-2 flex-shrink-0">✕</button>
                </div>
                <div className="overflow-auto p-2 flex-1 bg-slate-300 flex justify-center">
                  <img src={generatedImage} alt="スケジュール" className="max-w-full h-auto shadow-md" />
                </div>
                <div className="p-3 border-t bg-slate-50 flex-shrink-0">
                  <button onClick={() => setGeneratedImage(null)} className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-lg text-lg">閉じる</button>
                </div>
              </div>
            </div>
          )}

          {syncStatus === 'error' && (
            <div className="bg-red-600 text-white p-3 md:p-4 text-xs md:text-sm shadow-md z-50 flex-shrink-0">
              <div className="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
                <div>
                  <p className="font-bold">⚠️ データベース接続エラー</p>
                  <p className="mt-1">{syncErrorMsg}</p>
                  <p className="mt-1 text-[11px] md:text-xs opacity-90 font-bold bg-red-800 inline-block px-2 py-1 rounded">※現在お試しモードです</p>
                </div>
                <button onClick={() => setSyncStatus('offline')} className="bg-red-800 hover:bg-red-900 px-4 py-2 rounded font-bold border border-red-500">閉じる</button>
              </div>
            </div>
          )}

          <div className="bg-slate-800 text-white p-3 md:p-4 shadow-md z-30 flex flex-col gap-3 flex-shrink-0">
            <div className="flex justify-between items-center">
              <h1 className="font-bold text-base md:text-lg">川電テクノ スケジュールボード</h1>
              <div className="flex gap-2">
                {viewMode === 'edit' && (
                  <>
                    <button onClick={() => setIsPersonSettingOpen(true)} className="bg-slate-600 text-white px-3 py-2 text-xs md:text-sm rounded-lg font-bold shadow-sm active:scale-95 transition-transform">👤 人員管理</button>
                    <button onClick={() => setIsStampSettingOpen(true)} className="bg-slate-600 text-white px-3 py-2 text-xs md:text-sm rounded-lg font-bold shadow-sm active:scale-95 transition-transform">⚙️ スタンプ</button>
                  </>
                )}
                {/* ★追加：プレビューモードの時だけ画像保存ボタンを表示 */}
                {viewMode === 'preview' && (
                  <button onClick={exportToImage} className="bg-green-500 hover:bg-green-600 text-white px-3 py-2 text-xs md:text-sm rounded-lg font-bold shadow-sm active:scale-95 transition-transform whitespace-nowrap flex items-center gap-1 border border-green-400">
                    💾 画像保存
                  </button>
                )}
                <button onClick={() => setViewMode(viewMode === 'edit' ? 'preview' : 'edit')} className={`px-3 py-2 text-xs md:text-sm rounded-lg font-bold shadow-sm active:scale-95 transition-transform whitespace-nowrap ${viewMode === 'edit' ? 'bg-blue-500 text-white' : 'bg-white text-slate-800'}`}>{viewMode === 'edit' ? '📸 LINE用に切替' : '✏️ 編集に戻る'}</button>
              </div>
            </div>
            {viewMode === 'edit' && (
              <div className="flex items-center justify-between bg-slate-700 rounded-lg p-1 border border-slate-600 relative pb-4 md:pb-1">
                <button onClick={() => shiftDate(-7)} className="px-3 py-1 text-xs md:text-sm text-white hover:bg-slate-600 rounded">◀ 前の週</button>
                <div className="text-xs md:text-sm font-bold tracking-wider">{currentDates[0].date} 〜 {currentDates[13].date}</div>
                <button onClick={() => shiftDate(7)} className="px-3 py-1 text-xs md:text-sm text-white hover:bg-slate-600 rounded">次の週 ▶</button>
                <button onClick={resetToToday} className="absolute left-1/2 -bottom-3 -translate-x-1/2 bg-blue-500 text-white text-[10px] px-3 py-1 rounded-full shadow-lg border border-blue-400">今日に戻る</button>
              </div>
            )}
          </div>

          <div className={`p-2 md:p-4 flex-1 flex flex-col ${viewMode === 'edit' ? 'overflow-hidden' : ''}`}>
            {/* ★ここから下が画像として保存されるエリア */}
            <div id="capture-area" className={`flex flex-col gap-4 ${viewMode === 'preview' ? 'p-2 bg-gray-100 min-w-max' : 'h-full'}`}>
              <div className={`bg-white rounded-lg shadow-lg border-2 border-slate-300 relative ${viewMode === 'edit' ? 'flex-1 overflow-auto' : 'overflow-visible min-w-full'}`}>
                
                <div className={`flex border-b-2 border-slate-500 bg-slate-100 min-w-max ${viewMode === 'edit' ? 'sticky top-0 z-20 shadow-sm' : ''}`}>
                  <div className={`w-24 md:w-32 lg:w-40 flex-shrink-0 p-2 border-r-2 border-slate-400 font-bold flex items-center justify-center bg-slate-200 ${viewMode === 'edit' ? 'sticky left-0 top-0 z-30 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]' : 'border-b-2 border-slate-500'}`}>
                    現場 / 氏名
                  </div>
                  {currentDates.map((d, i) => {
                    const isToday = d.date === todayStr;
                    const headerBgClass = isToday ? 'bg-blue-100 border-b-2 border-blue-500' : (d.isHoliday ? 'bg-red-100' : 'bg-slate-50');
                    const dateColorClass = isToday ? 'text-blue-800' : (d.isHoliday ? 'text-red-600' : 'text-slate-800');
                    const dayColorClass = isToday ? 'text-blue-700' : (d.day === '土' ? 'text-blue-500' : (d.isHoliday ? 'text-red-500' : 'text-slate-500'));
                    
                    return (
                      <div key={i} className={`w-20 md:w-24 flex-shrink-0 p-2 text-center relative border-r border-slate-300 ${headerBgClass}`}>
                        <div className={`font-bold ${dateColorClass}`}>{d.date}</div>
                        <div className={`text-xs font-bold ${dayColorClass}`}>({d.day}){isToday && <span className="ml-1 text-[10px] bg-blue-500 text-white px-1 py-0.5 rounded-sm">今日</span>}</div>
                      </div>
                    );
                  })}
                </div>

                <div className="min-w-max">
                  <div className="border-b-4 border-slate-500">
                    {stamps.filter(s => s.type === 'site').map((site, sIndex) => {
                      const bgClass = site.colorClass.split(' ').find(c => c.startsWith('bg-'));
                      const rowBgClass = ROW_BGS[bgClass] || 'bg-white';
                      const textClass = site.colorClass.split(' ').find(c => c.startsWith('text-'));
                      return (
                        <div key={`site-${sIndex}`} className={`flex border-b border-slate-400 ${rowBgClass}`}>
                          <div className={`w-24 md:w-32 lg:w-40 flex-shrink-0 p-2 border-r-2 border-slate-400 font-bold flex flex-col justify-center items-center bg-slate-200 ${viewMode === 'edit' ? 'sticky left-0 z-10 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.15)]' : ''}`}>
                            <div className={`text-[11px] md:text-xs p-1 rounded w-full text-center border bg-white/90 ${textClass}`}>{site.name}</div>
                          </div>
                          {currentDates.map((d, dIndex) => {
                            const isHoliday = d.isHoliday;
                            const isToday = d.date === todayStr;
                            const cellBgClass = isToday ? 'bg-blue-50' : (isHoliday ? 'bg-red-50' : '');
                            
                            return (
                              <div key={dIndex} onClick={() => handleSiteCellClick(site.name, d.date)} className={`w-20 md:w-24 flex-shrink-0 p-1 flex items-center justify-center relative border-r border-slate-300 ${cellBgClass} ${viewMode === 'edit' ? 'cursor-pointer hover:bg-black/5 active:bg-black/10' : ''}`} style={{ minHeight: '3.5rem' }}>
                                <div className="text-[10px] md:text-xs font-bold text-slate-800 text-center break-all whitespace-pre-wrap leading-tight drop-shadow-sm">{siteSchedule[`${site.name}-${d.date}`]}</div>
                              </div>
                            );
                          })}
                        </div>
                      );
                    })}
                    <div className={`bg-slate-700 text-white text-[10px] font-bold py-1 px-4 w-full tracking-widest ${viewMode === 'edit' ? 'sticky left-0 z-10 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.15)]' : ''}`}>▼ 人員配置</div>
                  </div>

                  {peopleList.map((person, pIndex) => {
                    const pColorClass = personColors[person] || '';
                    const pBg = pColorClass.split(' ').find(c => c.startsWith('bg-')) || 'bg-slate-200';
                    const pRowBgClass = ROW_BGS[pBg] || 'bg-white';
                    const pTextColorClass = pColorClass.split(' ').find(c => c.startsWith('text-')) || 'text-slate-800';
                    return (
                      <div key={pIndex} className={`flex border-b border-slate-400 transition-colors ${pRowBgClass} hover:brightness-95`}>
                        <div onClick={() => viewMode === 'edit' && setSelectedPersonForColor(person)} className={`w-24 md:w-32 lg:w-40 flex-shrink-0 p-2 border-r-2 border-slate-400 font-bold flex items-center text-[11px] md:text-sm ${viewMode === 'edit' ? 'cursor-pointer sticky left-0 z-10 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.15)]' : ''} ${pBg} ${pTextColorClass}`}>
                          <span className="truncate pr-1">{person} 様</span>{viewMode === 'edit' && <span className="ml-auto text-[10px] opacity-40">🎨</span>}
                        </div>
                        {currentDates.map((d, dIndex) => {
                          const cellData = schedule[`${person}-${d.date}`];
                          const isToday = d.date === todayStr;
                          const isHoliday = d.isHoliday;
                          const cellBgClass = isToday ? 'bg-blue-50' : (isHoliday ? 'bg-red-50' : '');
                          
                          const cellItems = cellData ? (Array.isArray(cellData) ? cellData : [cellData]) : [];
                          const isSingle = cellItems.length === 1;

                          return (
                            <div key={dIndex} onClick={() => handlePersonCellClick(person, d.date)} 
                                 className={`w-20 md:w-24 flex-shrink-0 p-1 flex flex-col gap-1 relative border-r border-slate-300 
                                 ${cellBgClass} ${isToday ? 'border-x border-x-blue-400' : ''} 
                                 ${viewMode === 'edit' ? 'cursor-pointer hover:bg-black/5 active:bg-black/10' : ''} 
                                 ${isSingle ? 'justify-center items-center' : 'justify-start items-stretch'}`} 
                                 style={{ minHeight: '4rem' }}>
                              {cellItems.map((item, idx) => (
                                <div key={idx} className={`flex flex-col items-center justify-center w-full rounded border shadow-sm ${getStampColor(item.siteName)} ${isSingle ? 'p-2 h-full' : 'p-1'}`}>
                                  <div className="flex items-center justify-center gap-1">
                                    {item.time && <span className="text-[8px] bg-white/80 text-slate-800 px-1 rounded-sm font-bold shadow-sm whitespace-nowrap">{item.time}</span>}
                                    <span className={`font-bold leading-tight text-center ${isSingle ? 'text-xs md:text-sm' : 'text-[10px] md:text-[11px]'}`}>{item.siteName}</span>
                                  </div>
                                  {item.memo && <span className={`mt-0.5 pt-0.5 border-t border-black/10 w-full text-center leading-tight opacity-90 break-all ${isSingle ? 'text-[10px]' : 'text-[9px]'}`}>{item.memo}</span>}
                                </div>
                              ))}
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              </div>
              
              <div className="flex-shrink-0">
                <div className="bg-yellow-50 border-2 border-yellow-300 rounded-lg p-3 w-full shadow-sm">
                  <h3 className="font-bold text-yellow-800 mb-2 flex items-center text-sm md:text-base"><span className="mr-2">📝</span> 備考・連絡事項</h3>
                  {viewMode === 'edit' ? (
                    <textarea value={globalMemo} onChange={(e) => setGlobalMemo(e.target.value)} onBlur={() => updateCloud({ globalMemo })} placeholder="全体連絡事項を入力..." className="w-full bg-white border border-yellow-200 rounded p-2 text-sm outline-none focus:ring-2 focus:ring-yellow-400" rows={2}/>
                  ) : (
                    <div className="whitespace-pre-wrap text-sm text-slate-800 p-2 min-h-[3rem]">{globalMemo || "（備考なし）"}</div>
                  )}
                </div>
              </div>
            </div>
          </div>

          {selectedPersonCell && (
            <div className="fixed inset-0 bg-black/60 flex items-end justify-center z-50 backdrop-blur-sm p-4">
              <div className="bg-white w-full max-w-md rounded-2xl p-4 shadow-2xl animate-[slideUp_0.3s_ease-out]">
                <h3 className="font-bold text-lg text-slate-800 border-b pb-2 mb-4 flex justify-between items-center">
                  <span>{selectedPersonCell.date} : {selectedPersonCell.person} 様</span>
                  {stampMode === 'append' && (
                    <span className={`text-sm ${isCellFull ? 'text-red-500 font-bold' : 'text-slate-500 font-normal'}`}>
                      (登録済: {currentStampCount}/3)
                    </span>
                  )}
                </h3>
                
                <div className="mb-4">
                  <div className="flex flex-col gap-2 mb-3 bg-slate-50 p-3 rounded-lg border border-slate-200">
                    <div className="flex items-center gap-4">
                      <label className="text-sm font-bold text-slate-700">入力方法:</label>
                      <label className="flex items-center gap-1 text-sm cursor-pointer hover:opacity-80">
                        <input type="radio" name="stampMode" value="overwrite" checked={stampMode === 'overwrite'} onChange={() => setStampMode('overwrite')} className="w-4 h-4 text-blue-600" />
                        <span className={stampMode === 'overwrite' ? 'font-bold' : ''}>1日1現場 (上書き)</span>
                      </label>
                      <label className="flex items-center gap-1 text-sm cursor-pointer hover:opacity-80">
                        <input type="radio" name="stampMode" value="append" checked={stampMode === 'append'} onChange={() => setStampMode('append')} className="w-4 h-4 text-blue-600" />
                        <span className={stampMode === 'append' ? 'font-bold' : ''}>複数追加</span>
                      </label>
                    </div>
                    {stampMode === 'append' && (
                      <p className="text-xs text-blue-600 font-bold ml-16">※スタンプを押しても画面が閉じず、連続で追加できます。</p>
                    )}
                  </div>

                  <div className="mb-3 bg-slate-50 p-3 rounded-lg border border-slate-200">
                    <label className="text-sm font-bold text-slate-700 block mb-2">時間帯 (任意):</label>
                    <div className="flex flex-wrap gap-2">
                      {['', 'AM', 'PM', '夜', '深夜'].map(t => (
                        <label key={t} className={`flex items-center justify-center px-3 py-1.5 rounded-full border text-xs font-bold cursor-pointer transition-colors ${selectedTime === t ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-100'}`}>
                          <input type="radio" name="timeMode" value={t} checked={selectedTime === t} onChange={() => setSelectedTime(t)} className="hidden" />
                          {t === '' ? '指定なし' : t}
                        </label>
                      ))}
                    </div>
                  </div>

                  <label className="block text-xs font-bold text-slate-700 mb-1">✏️ 作業メモ</label>
                  <input 
                    type="text" 
                    value={memoInput} 
                    onChange={(e) => setMemoInput(e.target.value)} 
                    disabled={isCellFull}
                    className={`w-full border-2 rounded-lg p-3 text-sm focus:border-blue-500 outline-none transition-colors ${isCellFull ? 'bg-slate-100 border-slate-200 text-slate-400' : 'border-slate-200'}`} 
                    placeholder={isCellFull ? "3つ登録済みのため追加できません" : "作業内容など"}
                  />
                </div>
                <div className="grid grid-cols-2 gap-2 max-h-60 overflow-y-auto pb-4">
                  {stamps.map(s => (
                    <button 
                      key={s.id} 
                      onClick={() => handleStampClick(s.name)} 
                      disabled={isCellFull}
                      className={`p-3 rounded-lg border-2 font-bold text-sm transition-opacity ${s.colorClass} ${isCellFull ? 'opacity-40 cursor-not-allowed' : ''}`}
                    >
                      {s.name}
                    </button>
                  ))}
                  <button onClick={() => handleStampClick('空欄にする')} className="p-3 rounded-lg border-2 font-bold text-sm bg-slate-100 border-slate-200 text-slate-800 hover:bg-slate-200">
                    全クリア
                  </button>
                </div>
                <button onClick={() => setSelectedPersonCell(null)} className="w-full mt-2 py-2 text-slate-400 text-xs font-bold font-sans">閉じる</button>
              </div>
            </div>
          )}

          {selectedSiteCell && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
              <div className="bg-white w-full max-w-sm rounded-2xl p-5 shadow-2xl animate-[scaleIn_0.2s_ease-out]">
                <h3 className="font-bold text-lg text-slate-800 border-b pb-2 mb-4">{selectedSiteCell.date} : {selectedSiteCell.siteName}</h3>
                <textarea value={siteTaskInput} onChange={(e) => setSiteTaskInput(e.target.value)} className="w-full border-2 border-slate-200 rounded-lg p-3 text-sm focus:border-yellow-500 outline-none" rows={3} placeholder="この日の全体工程..."/>
                <div className="mt-4 flex gap-2"><button onClick={() => {setSiteTaskInput(''); saveSiteTask();}} className="flex-1 bg-slate-100 py-3 rounded-lg font-bold">クリア</button><button onClick={saveSiteTask} className="flex-1 bg-yellow-500 text-white py-3 rounded-lg font-bold">決定</button></div>
              </div>
            </div>
          )}

          {isStampSettingOpen && (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-2 backdrop-blur-sm">
              <div className="bg-white w-full max-w-lg rounded-2xl p-4 shadow-2xl max-h-[90vh] overflow-y-auto animate-[scaleIn_0.2s_ease-out]">
                <div className="flex justify-between items-center mb-6 border-b pb-3"><h2 className="font-bold text-xl font-sans">⚙️ スタンプ工房</h2><button onClick={() => setIsStampSettingOpen(false)} className="bg-slate-100 w-10 h-10 rounded-full font-bold">✕</button></div>
                <div className="bg-slate-50 p-4 rounded-xl mb-6 border border-slate-200">
                  <div className="flex gap-2 mb-3"><input type="text" value={newStampName} onChange={(e) => setNewStampName(e.target.value)} placeholder="名前" className="flex-1 border-2 border-slate-300 rounded-lg p-2 text-sm"/><select value={newStampType} onChange={(e) => setNewStampType(e.target.value)} className="border-2 border-slate-300 rounded-lg p-2 text-sm bg-white"><option value="site">現場</option><option value="status">状態</option></select></div>
                  <div className="flex flex-wrap gap-2 mb-3">{COLOR_PRESETS.map(p => <div key={p.id} onClick={() => setNewStampColor(p.class)} className={`w-8 h-8 rounded-full border-2 cursor-pointer ${p.class.split(' ')[0]} ${newStampColor === p.class ? 'ring-2 ring-offset-2 ring-blue-500' : 'border-slate-300'}`}/>)}</div>
                  <button onClick={addNewStamp} className="w-full bg-blue-600 text-white font-bold py-2 rounded-lg">追加</button>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-2">{stamps.map(s => <div key={s.id} className="flex justify-between items-center p-2 border rounded-lg"><div className={`px-2 py-1 rounded text-xs font-bold border ${s.colorClass}`}>{s.name}</div><button onClick={() => deleteStamp(s.id)} className="text-red-500 text-xs font-bold">削除</button></div>)}</div>
              </div>
            </div>
          )}

          {selectedPersonForColor && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
              <div className="bg-white w-full max-w-sm rounded-2xl p-5 shadow-2xl animate-[scaleIn_0.2s_ease-out]">
                <div className="flex justify-between items-center mb-4"><h3 className="font-bold text-lg text-slate-800">{selectedPersonForColor} 様の色</h3><button onClick={() => setSelectedPersonForColor(null)} className="bg-slate-100 w-8 h-8 rounded-full font-bold font-sans">✕</button></div>
                <div className="grid gap-2">
                  <button onClick={() => handlePersonColorClick('bg-slate-200 text-slate-800')} className="p-3 rounded-xl border-2 font-bold text-sm bg-slate-200">標準 (グレー)</button>
                  {COLOR_PRESETS.map((c, i) => <button key={i} onClick={() => handlePersonColorClick(c.class)} className={`p-3 rounded-xl border-2 font-bold text-sm ${c.class}`}>選択</button>)}
                </div>
              </div>
            </div>
          )}

          {isPersonSettingOpen && (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-2 backdrop-blur-sm">
              <div className="bg-white w-full max-w-md rounded-2xl p-4 shadow-2xl max-h-[90vh] flex flex-col animate-[scaleIn_0.2s_ease-out]">
                <div className="flex justify-between items-center mb-4 border-b pb-3"><h2 className="font-bold text-xl font-sans">👤 人員管理</h2><button onClick={() => setIsPersonSettingOpen(false)} className="bg-slate-100 w-10 h-10 rounded-full font-bold">✕</button></div>
                <div className="flex gap-2 mb-4 bg-slate-50 p-3 rounded-lg border border-slate-200"><input type="text" value={newPersonName} onChange={(e) => setNewPersonName(e.target.value)} placeholder="名前" className="flex-1 border-2 border-slate-300 rounded-lg p-2 text-sm"/><button onClick={addPerson} className="bg-blue-600 text-white font-bold px-4 py-2 rounded-lg">追加</button></div>
                <div className="flex-1 overflow-y-auto space-y-2">
                  {peopleList.map((p, i) => (
                    <div key={i} className="flex items-center justify-between p-2 border border-slate-200 rounded-lg bg-white">
                      {editingPersonIndex === i ? (
                        <div className="flex-1 flex gap-2 items-center mr-2">
                          <input 
                            type="text" 
                            value={editingPersonName} 
                            onChange={(e) => setEditingPersonName(e.target.value)}
                            className="flex-1 border-2 border-slate-300 rounded p-1 text-sm outline-none focus:border-blue-500"
                            autoFocus
                          />
                          <button onClick={() => saveEditPerson(i)} className="bg-green-500 text-white px-3 py-1 rounded text-xs font-bold shadow-sm">保存</button>
                          <button onClick={() => setEditingPersonIndex(null)} className="bg-slate-300 text-slate-800 px-3 py-1 rounded text-xs font-bold shadow-sm">取消</button>
                        </div>
                      ) : (
                        <>
                          <div className="font-bold text-slate-800 flex-1 truncate">{i+1}. {p}</div>
                          <div className="flex gap-1">
                            <button onClick={() => startEditPerson(i, p)} className="w-8 h-8 bg-blue-50 text-blue-600 rounded flex items-center justify-center text-sm shadow-sm hover:bg-blue-100 transition-colors" title="名前を編集">✏️</button>
                            <button onClick={() => movePerson(i, 'up')} className="w-6 h-6 bg-slate-100 rounded text-xs flex items-center justify-center hover:bg-slate-200">▲</button>
                            <button onClick={() => movePerson(i, 'down')} className="w-6 h-6 bg-slate-100 rounded text-xs flex items-center justify-center hover:bg-slate-200">▼</button>
                            <button onClick={() => deletePerson(i)} className="w-8 h-8 bg-red-50 text-red-600 rounded flex items-center justify-center text-sm shadow-sm hover:bg-red-100 transition-colors" title="削除">🗑️</button>
                          </div>
                        </>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          <style dangerouslySetInnerHTML={{__html: `@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } } @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }`}} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
